<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="50%" stop-color="#d4eaf0"/>
      <stop offset="100%" stop-color="#e8f4f8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" fill="url(#sky)"/>
  <!-- Mountains -->
  <polygon points="0,99 45,45 90,99" fill="#b8d8e8"/>
  <polygon points="63,99 108,36 153,99" fill="#b8d8e8"/>
  <polygon points="126,99 162,54 180,99" fill="#b8d8e8"/>
  <!-- Snow ground -->
  <rect x="0" y="99" width="180" height="81" fill="#d4eaf0"/>
  <!-- Skis -->
  <rect x="75" y="115" width="7" height="22" rx="2" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <rect x="98" y="115" width="7" height="22" rx="2" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <!-- Poles -->
  <line x1="72" y1="90" x2="72" y2="132" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="108" y1="90" x2="108" y2="132" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <circle cx="72" cy="132" r="2" fill="#aaa"/>
  <circle cx="108" cy="132" r="2" fill="#aaa"/>
  <!-- Body (red jacket) -->
  <rect x="81" y="88" width="18" height="30" rx="2" fill="#e63946"/>
  <rect x="81" y="108" width="18" height="5" fill="#c1121f"/>
  <!-- Head -->
  <rect x="84" y="74" width="12" height="16" rx="1" fill="#ffd6a0"/>
  <!-- Eyes -->
  <rect x="86" y="79" width="2.5" height="2.5" rx="0.5" fill="#333"/>
  <rect x="91.5" y="79" width="2.5" height="2.5" rx="0.5" fill="#333"/>
  <!-- Hat -->
  <rect x="82" y="70" width="16" height="6" rx="1" fill="#e63946"/>
  <!-- Pompom -->
  <circle cx="90" cy="69" r="3.5" fill="white"/>
  <!-- Goggles -->
  <rect x="83" y="76" width="14" height="4" rx="1" fill="#457b9d"/>
  <rect x="84" y="76.5" width="5.5" height="3" rx="0.5" fill="#88ccee"/>
  <rect x="90.5" y="76.5" width="5.5" height="3" rx="0.5" fill="#88ccee"/>
  <!-- Snow spray -->
  <circle cx="78" cy="140" r="3" fill="white" opacity="0.6"/>
  <circle cx="102" cy="142" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="88" cy="139" r="2" fill="white" opacity="0.7"/>
  <circle cx="95" cy="141" r="3.5" fill="white" opacity="0.5"/>
  <circle cx="72" cy="138" r="2" fill="white" opacity="0.4"/>
  <circle cx="107" cy="139" r="2.5" fill="white" opacity="0.4"/>
</svg>
